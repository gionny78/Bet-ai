<!DOCTYPE html>
<html>
<head>
  <title>Bet AI</title>
</head>
<body>

<h1>Partite ⚽</h1>

<div id="matches"></div>

<script>
fetch("/matches")
  .then(res => res.json())
  .then(data => {
    const container = document.getElementById("matches");

    data.response.forEach(match => {
      const div = document.createElement("div");

      div.innerHTML = `
        <h3>${match.title}</h3>
        <p>${match.competition}</p>
        <img src="${match.thumbnail}" width="300"/>
        <hr>
      `;

      container.appendChild(div);
    });
  })
  .catch(err => console.log(err));
</script>

</body>
</html>
