<!DOCTYPE html>
<html>
<head>
  <title>Bet AI ULTRA</title>

  <style>
    body {
      background: #0b2239;
      color: white;
      text-align: center;
      font-family: Arial;
      margin-top: 50px;
    }

    button {
      background: green;
      color: white;
      border: none;
      padding: 15px 30px;
      font-size: 18px;
      border-radius: 10px;
    }

    .card {
      background: #132f4c;
      margin: 15px auto;
      padding: 15px;
      border-radius: 10px;
      width: 85%;
    }

    .title {
      font-size: 18px;
      margin-bottom: 10px;
    }

    .tip {
      font-size: 20px;
      color: #00ffcc;
    }

    .warning {
      color: #ffd700;
      margin-top: 20px;
      font-size: 18px;
    }
  </style>
</head>

<body>

<h1>⚽ Bet AI ULTRA</h1>

<button onclick="run()">Analizza come tipster</button>

<div id="out"></div>

<script>
function run() {

  fetch("https://www.scorebat.com/video-api/v3/")
  .then(res => res.json())
  .then(data => {

    let games = data.response.slice(0, 25);

    let valid = [];

    games.forEach(match => {

      let name = match.title.toLowerCase();

      let strength = 0;

      // 🔥 squadre top
      if (name.includes("psg") || name.includes("bayern") || name.includes("city")) strength += 6;
      if (name.includes("real") || name.includes("barcelona")) strength += 5;
      if (name.includes("inter") || name.includes("milan") || name.includes("juventus")) strength += 4;

      // ⚖️ partita equilibrata
      if (name.includes("-")) strength += 2;

      // 🧠 forma simulata
      let form = Math.random() * 3;

      // 🏠 casa
      let home = Math.random() > 0.5 ? 2 : 0;

      let score = strength + form + home;

      // ❌ FILTRO: scarta partite deboli
      if (score < 6) return;

      let tip = "";

      // 🎯 LOGICA PIÙ RIGIDA
      if (strength >= 6 && home > 1) {
        tip = "1 + Over 1.5 🔥";
      } 
      else if (strength >= 5 && form > 1.5) {
        tip = "Over 1.5 ⚽";
      } 
      else if (form > 2) {
        tip = "Goal ✅";
      } 
      else {
        return; // scarta se non convincente
      }

      valid.push({ match, score, tip });

    });

    // ordina migliori
    valid.sort((a, b) => b.score - a.score);

    // prende massimo 2
    let picks = valid.slice(0, 2);

    let html = "<h2>🔥 GIOCATE SELEZIONATE 🔥</h2>";

    if (picks.length === 0) {
      html += "⚠️ Nessuna partita sicura oggi";
    } else {
      picks.forEach(p => {
        html += `
          <div class="card">
            <div class="title">${p.match.title}</div>
            <div class="tip">👉 ${p.tip}</div>
          </div>
        `;
      });
    }

    html += `<div class="warning">⚠️ Gioca massimo 1-2 eventi</div>`;

    document.getElementById("out").innerHTML = html;

  })
  .catch(() => {
    document.getElementById("out").innerHTML = "Errore";
  });

}
</script>

</body>
</html>
