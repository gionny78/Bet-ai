<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Partite</title>
</head>
<body>

<h1>Partite ⚽</h1>

<button onclick="caricaPartite()">Carica partite</button>

<div id="contenitore"></div>

<script>
async function caricaPartite() {
  const container = document.getElementById("contenitore");
  container.innerHTML = "Caricamento...";

  try {
    const res = await fetch("/matches");
    const data = await res.json();

    container.innerHTML = "";

    data.forEach(match => {
      const video = match.videos[0]?.embed || "";

      const div = document.createElement("div");
      div.innerHTML = `
        <h3>${match.title}</h3>
        <p>${match.competition}</p>
        ${video}
      `;

      container.appendChild(div);
    });

  } catch (err) {
    container.innerHTML = "Errore!";
    console.log(err);
  }
}
</script>

</body>
</html>
