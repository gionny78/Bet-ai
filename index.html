<!DOCTYPE html>
<html>
<head>
  <title>Bet AI ELITE</title>

  <style>
    body {
      background: #0b2239;
      color: white;
      text-align: center;
      font-family: Arial;
      margin-top: 50px;
    }

    button {
      background: green;
      color: white;
      border: none;
      padding: 15px 30px;
      font-size: 18px;
      cursor: pointer;
      border-radius: 10px;
    }

    .card {
      background: #132f4c;
      margin: 15px auto;
      padding: 15px;
      border-radius: 10px;
      width: 80%;
      max-width: 400px;
    }

    .title {
      font-size: 18px;
      margin-bottom: 10px;
    }

    .tip {
      font-size: 20px;
      color: #00ffcc;
    }

    .total {
      margin-top: 20px;
      font-size: 22px;
      color: gold;
    }
  </style>
</head>

<body>

  <h1>⚽ Bet AI ELITE</h1>

  <button onclick="run()">Analizza e genera</button>

  <div id="out"></div>

  <script>
    function run() {

      fetch("https://www.scorebat.com/video-api/v3/")
      .then(res => res.json())
      .then(data => {

        let games = data.response.slice(0, 20);

        let scoredGames = [];

        // valuta ogni partita
        games.forEach(match => {

          let name = match.title.toLowerCase();

          let strength = 0;

          // FORZA SQUADRE (simulata)
          if (name.includes("psg")) strength += 5;
          if (name.includes("bayern")) strength += 5;
          if (name.includes("manchester city")) strength += 5;

          if (name.includes("real madrid")) strength += 4;
          if (name.includes("barcelona")) strength += 4;

          if (name.includes("inter")) strength += 3;
          if (name.includes("milan")) strength += 3;
          if (name.includes("juventus")) strength += 3;

          // bonus random leggero (simula forma)
          strength += Math.random() * 2;

          scoredGames.push({ match, strength });
        });

        // ordina per forza
        scoredGames.sort((a, b) => b.strength - a.strength);

        let picks = scoredGames.slice(0, 3);

        let html = "<h2>🔥 ANALISI AI 🔥</h2>";

        let totalOdds = 1;

        picks.forEach(item => {

          let tip = "";
          let odd = 1.50;

          if (item.strength >= 6) {
            tip = "Over 2.5 ⚽";
            odd = 1.60;
          } 
          else if (item.strength >= 4) {
            tip = "Goal ✅";
            odd = 1.70;
          } 
          else {
            tip = "Under 3.5 📉";
            odd = 1.50;
          }

          totalOdds *= odd;

          html += `
            <div class="card">
              <div class="title">${item.match.title}</div>
              <div class="tip">👉 ${tip} | Quota: ${odd.toFixed(2)}</div>
            </div>
          `;
        });

        let probability = Math.max(40, (100 / totalOdds)).toFixed(0);

        html += `
          <div class="total">
            💰 Quota totale: ${totalOdds.toFixed(2)}<br>
            📊 Probabilità AI: ${probability}%
          </div>
        `;

        document.getElementById("out").innerHTML = html;

      })
      .catch(() => {
        document.getElementById("out").innerHTML = "Errore";
      });

    }
  </script>

</body>
</html>
