<!DOCTYPE html>
<html>
<head>
  <title>Bet AI PRO+</title>

  <style>
    body {
      background: #0b2239;
      color: white;
      text-align: center;
      font-family: Arial;
      margin-top: 50px;
    }

    button {
      background: green;
      color: white;
      border: none;
      padding: 15px 30px;
      font-size: 18px;
      cursor: pointer;
      border-radius: 10px;
    }

    .card {
      background: #132f4c;
      margin: 15px auto;
      padding: 15px;
      border-radius: 10px;
      width: 80%;
      max-width: 400px;
    }

    .title {
      font-size: 18px;
      margin-bottom: 10px;
    }

    .tip {
      font-size: 20px;
      color: #00ffcc;
    }

    .total {
      margin-top: 20px;
      font-size: 22px;
      color: #ffd700;
    }
  </style>
</head>

<body>

  <h1>⚽ Bet AI PRO+</h1>

  <button onclick="run()">Genera schedina</button>

  <div id="out"></div>

  <script>
    function run() {

      fetch("https://www.scorebat.com/video-api/v3/")
      .then(res => res.json())
      .then(data => {

        let games = data.response.slice(0, 20);

        let used = new Set();
        let scoredGames = [];

        // assegna punteggio
        games.forEach(match => {

          if (used.has(match.title)) return;
          used.add(match.title);

          let name = match.title.toLowerCase();
          let score = 0;

          if (name.includes("psg")) score += 3;
          if (name.includes("bayern")) score += 3;
          if (name.includes("manchester")) score += 3;
          if (name.includes("real")) score += 2;
          if (name.includes("barcelona")) score += 2;
          if (name.includes("inter")) score += 2;
          if (name.includes("milan")) score += 2;

          scoredGames.push({ match, score });
        });

        // ordina
        scoredGames.sort((a, b) => b.score - a.score);

        // prende 3 migliori
        let picks = scoredGames.slice(0, 3);

        let html = "<h2>🔥 SCHEDINA PRO 🔥</h2>";

        let totalOdds = 1;

        picks.forEach(item => {

          let tip = "";
          let odd = 1.50;

          if (item.score >= 3) {
            tip = "Over 2.5 ⚽";
            odd = 1.60;
          } else if (item.score >= 2) {
            tip = "Goal ✅";
            odd = 1.70;
          } else {
            tip = "Under 3.5 📉";
            odd = 1.50;
          }

          totalOdds *= odd;

          html += `
            <div class="card">
              <div class="title">${item.match.title}</div>
              <div class="tip">👉 ${tip} | Quota: ${odd.toFixed(2)}</div>
            </div>
          `;
        });

        let probability = Math.max(35, (100 / totalOdds)).toFixed(0);

        html += `
          <div class="total">
            💰 Quota totale: ${totalOdds.toFixed(2)}<br>
            📊 Probabilità: ${probability}%
          </div>
        `;

        document.getElementById("out").innerHTML = html;

      })
      .catch(() => {
        document.getElementById("out").innerHTML = "Errore";
      });

    }
  </script>

</body>
</html>
