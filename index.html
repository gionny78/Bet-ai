<!DOCTYPE html>
<html>
<head>
    <title>Bet AI</title>
    <style>
        body {
            background-color: #0b1a2f;
            color: white;
            text-align: center;
            font-family: Arial;
        }

        button {
            background-color: green;
            color: white;
            padding: 15px;
            border: none;
            font-size: 18px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <h1>⚽ Bet AI</h1>

    <button onclick="run()">Trova giocate</button>

    <p id="out"></p>

    <script>
    function run() {
        fetch("https://v3.football.api-sports.io/fixtures?live=all", {
            method: "GET",
            headers: {
                "x-apisports-key": "042a5bb7cdac43080f332ac922910006"
            }
        })
        .then(res => res.json())
        .then(data => {
            if(data.response.length > 0){
                let match = data.response[0];
                document.getElementById("out").innerHTML =
                    match.teams.home.name + " vs " + match.teams.away.name;
            } else {
                document.getElementById("out").innerHTML = "Nessuna partita live";
            }
        })
        .catch(err => {
            document.getElementById("out").innerHTML = "Errore";
        });
    }
    </script>

</body>
</html>
