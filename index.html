<!DOCTYPE html>
<html>
<head>
  <title>Bet AI</title>
  <style>
    body {
      background: #0b2239;
      color: white;
      text-align: center;
      font-family: Arial;
      margin-top: 100px;
    }

    button {
      background: green;
      color: white;
      border: none;
      padding: 15px 25px;
      font-size: 18px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <h1>⚽ Bet AI</h1>

  <button onclick="run()">Trova giocate</button>

  <p id="out"></p>

  <script>
    function run() {

      fetch("https://www.scorebat.com/video-api/v3/")
      .then(res => res.json())
      .then(data => {

        if (data.response.length > 0) {

          // prende una partita casuale
          let best = data.response[Math.floor(Math.random() * data.response.length)];

          // pronostici possibili
          let tips = [
            "Over 2.5 ⚽",
            "Goal ✅",
            "1 fisso 🏠",
            "Under 3.5 📉"
          ];

          // sceglie pronostico casuale
          let tip = tips[Math.floor(Math.random() * tips.length)];

          // output finale
          document.getElementById("out").innerHTML =
            "🔥 MIGLIOR GIOCATA 🔥<br><br>" +
            best.title + "<br><br>" +
            "👉 " + tip;

        } else {
          document.getElementById("out").innerHTML = "Nessuna partita";
        }

      })
      .
