<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bet AI PRO</title>

<style>
body {background:#0f172a; color:white; text-align:center; font-family:Arial;}
button {padding:12px; background:#22c55e; color:white; border:none;}
.card {margin:15px; padding:15px; background:#1e293b; border-radius:10px;}
</style>

</head>
<body>

<h1>⚽ Bet AI PRO</h1>
<button onclick="run()">Analizza partite</button>

<div id="out"></div>

<script>

function run(){

 let matches = [
  {home:"Milan", away:"Roma", forza:0.65},
  {home:"Inter", away:"Lazio", forza:0.70},
  {home:"Juventus", away:"Napoli", forza:0.55}
 ];

 let html = "";

 matches.forEach(m => {

  let quota = 1.9;
  let value = (m.forza * quota) - 1;

  if(value > 0.1 && m.forza > 0.6){
    html += `<div class="card">
      ${m.home} vs ${m.away}<br>
      💰 Punta CASA<br>
      Stake: 10€
    </div>`;
  }

 });

 if(html==="") html = "🚫 Nessuna giocata oggi";

 document.getElementById("out").innerHTML = html;
}

</script>

</body>
</html>
