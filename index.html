<!DOCTYPE html>
<html>
<head>
  <title>Bet AI</title>
  <style>
    body {
      background: #0b2239;
      color: white;
      text-align: center;
      font-family: Arial;
      margin-top: 100px;
    }

    button {
      background: green;
      color: white;
      border: none;
      padding: 15px 25px;
      font-size: 18px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <h1>⚽ Bet AI</h1>

  <button onclick="run()">Trova giocate</button>

  <p id="out"></p>

  <script>
    function run() {

      fetch("https://www.scorebat.com/video-api/v3/")
      .then(res => res.json())
      .then(data => {

        if (data.response.length > 0) {

          let games = data.response.slice(0, 10);

          let best = games[Math.floor(Math.random() * games.length)];

          let name = best.title.toLowerCase();

          let tip = "";

          // LOGICA MIGLIORATA
          if (name.includes("psg") || name.includes("bayern") || name.includes("manchester city")) {
            tip = "Over 2.5 ⚽";
          } 
          else if (name.includes("inter") || name.includes("milan") || name.includes("juventus")) {
            tip = "1X 🛡️";
          } 
          else if (name.includes("barcelona") || name.includes("real madrid")) {
            tip = "Goal ✅";
          } 
          else {
            tip = "Under 3.5 📉";
          }

          document.getElementById("out").innerHTML =
            "🔥 MIGLIOR GIOCATA 🔥<br><br>" +
            best.title + "<br><br>" +
            "👉 " + tip;

        } else {
          document.getElementById("out").innerHTML = "Nessuna partita";
        }

      })
      .catch(err => {
        document.getElementById("out").innerHTML = "Errore";
      });

    }
  </script>

</body>
</html>
