<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bet AI</title>

<style>
body {background:#0f172a; color:white; text-align:center; font-family:Arial;}
.card {background:#1e293b; margin:15px; padding:15px; border-radius:10px;}
button {padding:10px; background:green; color:white; border:none;}
</style>
</head>

<body>

<h1>⚽ Bet AI LIVE</h1>
<button onclick="run()">Trova partite</button>

<div id="out"></div>

<script>

const API_KEY = "44499c55bca08e30a2154358d176f622";

async function run(){

 let res = await fetch("https://v3.football.api-sports.io/fixtures?league=39&season=2023",)", {
   headers: { "x-apisports-key": API_KEY }
 });

 let data = await res.json();

 let html = "";

 data.response.forEach(m => {

   let home = m.teams.home.name;
   let away = m.teams.away.name;

   html += `<div class="card">
     ${home} vs ${away}<br>
     🔍 Analisi in corso...
   </div>`;
 });

 if(html==="") html = "Nessuna partita trovata";

 document.getElementById("out").innerHTML = html;
}

</script>

</body>
</html>
