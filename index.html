<!DOCTYPE html>
<html>
<head>
  <title>Bet AI PRO FINAL</title>

  <style>
    body {
      background: #0b2239;
      color: white;
      text-align: center;
      font-family: Arial;
      margin-top: 50px;
    }

    button {
      background: green;
      color: white;
      border: none;
      padding: 15px 30px;
      font-size: 18px;
      border-radius: 10px;
    }

    .card {
      background: #132f4c;
      margin: 15px auto;
      padding: 15px;
      border-radius: 10px;
      width: 85%;
    }

    .tip {
      font-size: 20px;
      color: #00ffcc;
    }

    .warning {
      color: gold;
      margin-top: 20px;
    }
  </style>
</head>

<body>

<h1>⚽ Bet AI PRO FINAL</h1>

<button onclick="run()">Trova giocate top</button>

<div id="out"></div>

<script>
function run() {

  fetch("https://www.scorebat.com/video-api/v3/")
  .then(res => res.json())
  .then(data => {

    let games = data.response.slice(0, 50);

    let valid = [];

    let leagues = ["serie a","premier","la liga","bundesliga","ligue 1"];

    let topTeams = [
      "psg","bayern","manchester","real","barcelona",
      "inter","milan","juventus","arsenal","liverpool"
    ];

    games.forEach(match => {

      let title = match.title.toLowerCase();
      let competition = match.competition.toLowerCase();

      // 🔴 filtro campionati
      if (!leagues.some(l => competition.includes(l))) return;

      // 🔴 filtro squadre forti
      let strongTeams = topTeams.filter(t => title.includes(t)).length;
      if (strongTeams === 0) return;

      let score = 0;

      // 🔥 forza reale
      score += strongTeams * 3;

      // ⚖️ equilibrio
      if (title.includes("-")) score += 2;

      // 🏠 casa (meno random)
      let home = Math.random() > 0.4 ? 2 : 0;
      score += home;

      // 🧠 forma (meno casuale)
      let form = Math.random() * 2;
      score += form;

      // ❌ filtro forte (chiave)
      if (score < 7) return;

      let tip = "";

      // 🎯 LOGICA SUPER RIGIDA
      if (strongTeams >= 2 && score >= 9) {
        tip = "Goal ✅";
      } 
      else if (strongTeams >= 1 && home > 1 && score >= 8) {
        tip = "1 + Over 1.5 🔥";
      } 
      else if (score >= 7.5) {
        tip = "Over 1.5 ⚽";
      } 
      else {
        return;
      }

      valid.push({ match, score, tip });

    });

    // ordina migliori
    valid.sort((a, b) => b.score - a.score);

    // 🔥 massimo 2 giocate
    let picks = valid.slice(0, 2);

    let html = "<h2>🔥 GIOCATE ULTRA SELEZIONATE 🔥</h2>";

    if (picks.length === 0) {
      html += "⚠️ Oggi niente partite davvero sicure";
    } else {
      picks.forEach(p => {
        html += `
          <div class="card">
            <div>${p.match.title}</div>
            <div class="tip">👉 ${p.tip}</div>
          </div>
        `;
      });
    }

    html += `<div class="warning">⚠️ Gioca massimo 1-2 eventi</div>`;

    document.getElementById("out").innerHTML = html;

  })
  .catch(() => {
    document.getElementById("out").innerHTML = "Errore";
  });

}
</script>

</body>
</html>
