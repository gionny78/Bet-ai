<!DOCTYPE html>
<html>
<head>
  <title>Partite</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: Arial;
      margin: 0;
      padding: 20px;
      background: #f5f5f5;
    }

    h1 {
      text-align: center;
    }

    button {
      width: 100%;
      padding: 12px;
      background: black;
      color: white;
      border: none;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 16px;
    }

    .card {
      background: white;
      padding: 15px;
      margin-bottom: 20px;
      border-radius: 10px;
    }

    img {
      width: 100%;
      border-radius: 8px;
    }

    iframe {
      width: 100%;
      height: 220px;
      border: none;
      margin-top: 10px;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<h1>Partite ⚽</h1>

<button onclick="caricaPartite()">Carica partite</button>

<div id="matches"></div>

<script>
function caricaPartite() {
  fetch("/matches")
    .then(res => res.json())
    .then(data => {
      const container = document.getElementById("matches");
      container.innerHTML = "";

      data.forEach(match => {
        const div = document.createElement("div");
        div.className = "card";

        // 🔥 PRENDIAMO SOLO L'IFRAME (fix area nera)
        let iframe = "";

        if (match.videos && match.videos.length > 0) {
          const embed = match.videos[0].embed;

          const srcMatch = embed.match(/src='([^']+)'/);
          if (srcMatch) {
            iframe = `<iframe src="${srcMatch[1]}" allowfullscreen></iframe>`;
          }
        }

        div.innerHTML = `
          <h3>${match.title}</h3>
          <p>${match.competition}</p>
          <img src="${match.thumbnail}">
          ${iframe}
        `;

        container.appendChild(div);
      });
    })
    .catch(err => console.log(err));
}
</script>

</body>
</html>
