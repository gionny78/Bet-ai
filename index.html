<script>
function run() {

  fetch("https://www.scorebat.com/video-api/v3/")
  .then(res => res.json())
  .then(data => {

    let games = data.response.slice(0, 10);

    let bestMatch = null;
    let bestScore = 0;

    games.forEach(match => {

      let name = match.title.toLowerCase();
      let score = 0;

      // LOGICA BASE
      if (name.includes("psg")) score += 3;
      if (name.includes("bayern")) score += 3;
      if (name.includes("city")) score += 3;
      if (name.includes("real")) score += 2;
      if (name.includes("inter")) score += 2;

      if (score > bestScore) {
        bestScore = score;
        bestMatch = match;
      }
    });

    let tip = "";

    if (bestScore >= 3) {
      tip = "Over 2.5 ⚽";
    } else if (bestScore >= 2) {
      tip = "Goal ✅";
    } else {
      tip = "Under 3.5 📉";
    }

    document.getElementById("out").innerHTML =
      "🔥 MIGLIOR GIOCATA 🔥<br><br>" +
      bestMatch.title + "<br><br>" +
      "👉 " + tip;

  });

}
</script>
