<!DOCTYPE html>
<html>
<head>
  <title>Partite</title>

  <style>
    body {
      font-family: Arial;
      padding: 10px;
      background: #f5f5f5;
    }

    h1 {
      text-align: center;
    }

    button {
      padding: 10px;
      font-size: 16px;
      margin-bottom: 15px;
      width: 100%;
      border: none;
      background: black;
      color: white;
      border-radius: 8px;
    }

    .match {
      background: white;
      padding: 10px;
      margin-bottom: 15px;
      border-radius: 10px;
    }

    img {
      width: 100%;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<h1>Partite ⚽</h1>

<button id="btn">Carica partite</button>

<div id="matches"></div>

<script>
const btn = document.getElementById("btn");

btn.addEventListener("click", caricaPartite);

// AUTO LOAD
window.onload = caricaPartite;

function caricaPartite() {
  fetch("/matches")
    .then(res => res.json())
    .then(data => {
      const container = document.getElementById("matches");
      container.innerHTML = "";

      data.forEach(match => {
        const div = document.createElement("div");
        div.className = "match";

        div.innerHTML = `
          <h3>${match.title}</h3>
          <p>${match.competition}</p>
          <img src="${match.thumbnail}" />
          ${match.videos?.[0]?.embed || ""}
        `;

        container.appendChild(div);
      });
    })
    .catch(err => {
      console.log("Errore:", err);
      alert("Errore caricamento");
    });
}
</script>

</body>
</html>
