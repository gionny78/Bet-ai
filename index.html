<!DOCTYPE html>
<html>
<head>
  <title>Bet AI</title>

  <style>
    body {
      background: #0b2239;
      color: white;
      text-align: center;
      font-family: Arial;
      margin-top: 80px;
    }

    button {
      background: green;
      color: white;
      border: none;
      padding: 15px 30px;
      font-size: 18px;
      cursor: pointer;
      border-radius: 10px;
    }

    #out {
      margin-top: 30px;
      font-size: 22px;
    }
  </style>
</head>

<body>

  <h1>⚽ Bet AI</h1>

  <button onclick="run()">Trova giocata</button>

  <div id="out">Clicca per analizzare</div>

  <script>
function run() {

  fetch("https://v3.football.api-sports.io/fixtures?next=10", {
    method: "GET",
    headers: {
      "x-apisports-key": "METTI_LA_TUA_API_KEY"
    }
  })
  .then(res => res.json())
  .then(data => {

    let matches = data.response;

    let bestMatch = null;
    let bestScore = -999;
    let bestTip = "";

    matches.forEach(m => {

      let home = m.teams.home.name;
      let away = m.teams.away.name;

      let score = 0;

      // 🏠 CASA
      score += 2;

      // ⚽ IMPORTANZA PARTITA
      if (m.league.name.includes("Premier") || m.league.name.includes("Serie A")) {
        score += 3;
      }

      // ⏱ PARTITE VICINE (più interessanti)
      if (m.fixture.status.short === "NS") {
        score += 2;
      }

      // 🎯 PRONOSTICO
      let tip = "";

      if (score >= 6) {
        tip = "Over 2.5 ⚽";
      } else if (score >= 4) {
        tip = "Goal ✅";
      } else {
        tip = "Under 3.5 📉";
      }

      if (score > bestScore) {
        bestScore = score;
        bestMatch = m;
        bestTip = tip;
      }

    });

    document.getElementById("out").innerHTML =
      "🔥 MIGLIOR PARTITA 🔥<br><br>" +
      bestMatch.teams.home.name + " - " +
      bestMatch.teams.away.name + "<br><br>" +
      "👉 " + bestTip;

  })
  .catch(() => {
    document.getElementById("out").innerHTML = "Errore API";
  });

}
</script>
