<!DOCTYPE html>
<html>
<head>
  <title>Bet AI</title>

  <style>
    body {
      background: #0b2239;
      color: white;
      text-align: center;
      font-family: Arial;
      margin-top: 80px;
    }

    button {
      background: green;
      color: white;
      border: none;
      padding: 15px 30px;
      font-size: 18px;
      cursor: pointer;
      border-radius: 10px;
    }

    #out {
      margin-top: 30px;
      font-size: 22px;
    }
  </style>
</head>

<body>

  <h1>⚽ Bet AI</h1>

  <button onclick="run()">Trova giocata</button>

  <div id="out">Clicca per analizzare</div>

  <script>
    function run() {

      fetch("https://www.scorebat.com/video-api/v3/")
      .then(res => res.json())
      .then(data => {

        let games = data.response.slice(0, 15);

        let bestMatch = null;
        let bestScore = -999;
        let bestTip = "";

        games.forEach(match => {

          let name = match.title.toLowerCase();

          let score = 0;
          let tip = "";

          // 🧠 FORZA SQUADRE
          if (name.includes("psg") || name.includes("bayern") || name.includes("manchester")) {
            score += 5;
          }

          if (name.includes("real") || name.includes("barcelona")) {
            score += 4;
          }

          if (name.includes("inter") || name.includes("milan") || name.includes("juventus")) {
            score += 3;
          }

          // 🏠 CASA
          score += 1;

          // ⚽ ATTACCO
          let attack = Math.random() * 3;

          // 🛡 DIFESA
          let defense = Math.random() * 3;

          score += attack + defense;

          // 🎯 PRONOSTICO
          if (attack > 2) {
            tip = "Over 2.5 ⚽";
          } else if (defense > 2) {
            tip = "Under 3.5 📉";
          } else if (score > 6) {
            tip = "1 fisso 🏠";
          } else {
            tip = "Goal ✅";
          }

          if (score > bestScore) {
            bestScore = score;
            bestMatch = match;
            bestTip = tip;
          }

        });

        document.getElementById("out").innerHTML =
          "🔥 AI CONSIGLIA 🔥<br><br>" +
          bestMatch.title + "<br><br>" +
          "👉 " + bestTip;

      })
      .catch(() => {
        document.getElementById("out").innerHTML = "Errore caricamento";
      });

    }
  </script>

</body>
</html>
