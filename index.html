<!DOCTYPE html>
<html>
<head>
  <title>Bet AI Tipster</title>

  <style>
    body {
      background: #0b2239;
      color: white;
      text-align: center;
      font-family: Arial;
      margin-top: 50px;
    }

    button {
      background: green;
      color: white;
      border: none;
      padding: 15px 30px;
      font-size: 18px;
      border-radius: 10px;
    }

    .card {
      background: #132f4c;
      margin: 15px auto;
      padding: 15px;
      border-radius: 10px;
      width: 85%;
    }

    .title {
      font-size: 18px;
      margin-bottom: 10px;
    }

    .tip {
      font-size: 20px;
      color: #00ffcc;
    }

    .safe {
      color: #ffd700;
      margin-top: 20px;
      font-size: 20px;
    }
  </style>
</head>

<body>

<h1>⚽ Bet AI TIPSTER</h1>

<button onclick="run()">Trova giocate serie</button>

<div id="out"></div>

<script>
function run() {

  fetch("https://www.scorebat.com/video-api/v3/")
  .then(res => res.json())
  .then(data => {

    let games = data.response.slice(0, 20);

    let list = [];

    games.forEach(match => {

      let name = match.title.toLowerCase();

      let strength = 0;

      // 🧠 SQUADRE FORTI
      if (name.includes("psg") || name.includes("bayern") || name.includes("city")) strength += 6;
      if (name.includes("real") || name.includes("barcelona")) strength += 5;
      if (name.includes("inter") || name.includes("milan") || name.includes("juventus")) strength += 4;

      // ⚖️ PARTITA INTERESSANTE
      if (name.includes("-")) strength += 2;

      // 🧠 SIMULAZIONE FORMA
      let form = Math.random() * 3;

      // 🏠 CASA
      let home = Math.random() > 0.5 ? 2 : 0;

      let score = strength + form + home;

      let tip = "";

      // 🎯 LOGICA TIPSTER (più realistica)
      if (strength >= 6 && home > 1) {
        tip = "1 + Over 1.5 🔥";
      } 
      else if (strength >= 5) {
        tip = "Over 1.5 ⚽";
      } 
      else if (form > 2) {
        tip = "Goal ✅";
      } 
      else {
        tip = "Under 3.5 📉";
      }

      list.push({ match, score, tip });

    });

    // ordina
    list.sort((a, b) => b.score - a.score);

    // migliori 2 (più realistico)
    let picks = list.slice(0, 2);

    let html = "<h2>🔥 GIOCATE CONSIGLIATE 🔥</h2>";

    picks.forEach(p => {
      html += `
        <div class="card">
          <div class="title">${p.match.title}</div>
          <div class="tip">👉 ${p.tip}</div>
        </div>
      `;
    });

    html += `<div class="safe">⚠️ Gioca massimo 1-2 eventi</div>`;

    document.getElementById("out").innerHTML = html;

  })
  .catch(() => {
    document.getElementById("out").innerHTML = "Errore";
  });

}
</script>

</body>
</html>
