<!DOCTYPE html>
<html>
<head>
  <title>Bet AI REAL</title>

  <style>
    body {
      background: #0b2239;
      color: white;
      text-align: center;
      font-family: Arial;
    }

    h1 { font-size: 38px; }

    button {
      font-size: 22px;
      padding: 15px 30px;
      border-radius: 10px;
      background: green;
      color: white;
      border: none;
    }

    .card {
      background: #132f4c;
      margin: 15px;
      padding: 20px;
      border-radius: 15px;
      font-size: 22px;
    }

    .tip {
      font-size: 26px;
      color: #00ffcc;
    }
  </style>
</head>

<body>

<h1>⚽ Bet AI REAL</h1>

<button onclick="run()">Partite di oggi</button>

<div id="out"></div>

<script>
function run() {

  fetch("https://www.scorebat.com/video-api/v3/")
  .then(res => res.json())
  .then(data => {

    let today = new Date().toISOString().split("T")[0];

    let leagues = ["serie a","premier","la liga","bundesliga","ligue 1"];

    let valid = [];

    data.response.forEach(match => {

      let date = match.date ? match.date.split("T")[0] : "";
      if (date !== today) return;

      let comp = match.competition.toLowerCase();
      if (!leagues.some(l => comp.includes(l))) return;

      let title = match.title;

      valid.push(title);

    });

    let html = "<h2>📅 PARTITE DI OGGI</h2>";

    if (valid.length === 0) {
      html += "⚠️ Nessuna partita trovata";
    } else {
      valid.slice(0,5).forEach(m => {
        html += `<div class="card">${m}</div>`;
      });
    }

    document.getElementById("out").innerHTML = html;

  })
  .catch(() => {
    document.getElementById("out").innerHTML = "Errore";
  });

}
</script>

</body>
</html>
