<!DOCTYPE html>
<html>
<head>
  <title>Bet AI FIX</title>

  <style>
    body {
      background: #0b2239;
      color: white;
      text-align: center;
      font-family: Arial;
    }

    button {
      font-size: 22px;
      padding: 15px 30px;
      margin-top: 20px;
      background: green;
      color: white;
      border: none;
      border-radius: 10px;
    }

    .card {
      background: #132f4c;
      margin: 10px;
      padding: 15px;
      border-radius: 10px;
      font-size: 20px;
    }
  </style>
</head>

<body>

<h1>⚽ Bet AI</h1>

<button onclick="run()">Carica partite</button>

<div id="out">Premi il bottone</div>

<script>
function run() {

  let out = document.getElementById("out");
  out.innerHTML = "⏳ Caricamento...";

  fetch("https://www.scorebat.com/video-api/v3/")
  .then(res => res.json())
  .then(data => {

    console.log(data); // DEBUG

    if (!data || !data.response) {
      out.innerHTML = "❌ Errore API";
      return;
    }

    let matches = data.response;

    let html = "<h2>📅 PARTITE TROVATE</h2>";

    if (matches.length === 0) {
      html += "⚠️ Nessuna partita disponibile";
    } else {

      matches.slice(0,5).forEach(m => {
        html += `<div class="card">${m.title}</div>`;
      });

    }

    out.innerHTML = html;

  })
  .catch(err => {
    out.innerHTML = "❌ Errore caricamento";
    console.log(err);
  });

}
</script>

</body>
</html>
