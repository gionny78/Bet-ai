<!DOCTYPE html>
<html>
<body style="background:#0b1d2a;color:white;text-align:center;font-family:Arial">

<h1>⚽ Bet AI</h1>

<button onclick="run()" style="padding:15px 30px;background:green;color:white;border:none;font-size:18px">
Trova giocate
</button>

<p id="out">Clicca il bottone</p>

<script>
function run() {
  fetch("https://www.scorebat.com/video-api/v3/")
  .then(res => res.json())
  .then(data => {

    if (data.response.length > 0) {

      // prendi 5 partite
      let matches = data.response.slice(0, 5);

      // scegli UNA partita casuale
      let best = matches[Math.floor(Math.random() * matches.length)];

      // lista pronostici
      let tips = [
        "Over 2.5 ⚽",
        "Goal ✅",
        "1 fisso 🏠",
        "Under 3.5 📉"
      ];

      // scegli pronostico casuale
      let tip = tips[Math.floor(Math.random() * tips.length)];

      // output finale
      document.getElementById("out").innerHTML =
        "🔥 MIGLIOR GIOCATA DEL GIORNO 🔥<br><br>" +
        best.title + "<br><br>" +
        "👉 Pronostico: " + tip;

    } else {
      document.getElementById("out").innerHTML = "Nessuna partita trovata";
    }

  })
  .catch(err => {
    document.getElementById("out").innerHTML = "Errore";
  });
}
</script>
