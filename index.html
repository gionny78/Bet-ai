<!DOCTYPE html>
<html>
<head>
  <title>Bet AI Mobile PRO</title>

  <style>
    body {
      background: #0b2239;
      color: white;
      text-align: center;
      font-family: Arial;
      margin-top: 60px;
    }

    button {
      background: green;
      color: white;
      border: none;
      padding: 15px 30px;
      font-size: 18px;
      border-radius: 10px;
    }

    .card {
      background: #132f4c;
      margin: 15px auto;
      padding: 15px;
      border-radius: 10px;
      width: 85%;
    }

    .title {
      font-size: 18px;
      margin-bottom: 10px;
    }

    .tip {
      font-size: 20px;
      color: #00ffcc;
    }
  </style>
</head>

<body>

<h1>⚽ Bet AI PRO</h1>

<button onclick="run()">Analizza</button>

<div id="out"></div>

<script>
function run() {

  fetch("https://www.scorebat.com/video-api/v3/")
  .then(res => res.json())
  .then(data => {

    let games = data.response.slice(0, 20);

    let list = [];

    games.forEach(match => {

      let name = match.title.toLowerCase();

      let strength = 0;

      // 🔥 FORZA SQUADRE
      if (name.includes("psg") || name.includes("bayern") || name.includes("city")) strength += 5;
      if (name.includes("real") || name.includes("barcelona")) strength += 4;
      if (name.includes("inter") || name.includes("milan") || name.includes("juventus")) strength += 3;

      // ⚖️ EQUILIBRIO
      if (name.includes("-")) strength += 2;

      // 🧠 ATTACCO / DIFESA
      let attack = Math.random() * 3;
      let defense = Math.random() * 3;

      // 🏠 CASA
      let home = Math.random() > 0.5 ? 2 : 0;

      let score = strength + attack + defense + home;

      let tip = "";

      // 🎯 LOGICA PRONOSTICO
      if (attack > 2.2 && strength > 4) {
        tip = "Over 2.5 ⚽";
      } 
      else if (attack > 1.5 && defense < 1.5) {
        tip = "Goal ✅";
      } 
      else if (defense > 2.2) {
        tip = "Under 3.5 📉";
      } 
      else if (home > 1 && strength > 3) {
        tip = "1 fisso 🏠";
      } 
      else {
        tip = "Goal ✅";
      }

      list.push({ match, score, tip });

    });

    // ordina migliori
    list.sort((a, b) => b.score - a.score);

    let picks = list.slice(0, 3);

    let html = "<h2>🔥 SCHEDINA AI 🔥</h2>";

    picks.forEach(p => {
      html += `
        <div class="card">
          <div class="title">${p.match.title}</div>
          <div class="tip">👉 ${p.tip}</div>
        </div>
      `;
    });

    document.getElementById("out").innerHTML = html;

  })
  .catch(() => {
    document.getElementById("out").innerHTML = "Errore";
  });

}
</script>

</body>
</html>
