<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bet AI</title>

<style>
body {
  margin: 0;
  padding: 0;
  background: linear-gradient(#0b2a3a, #061a24);
  color: white;
  text-align: center;
  font-family: Arial;
}

h1 {
  margin-top: 40px;
  font-size: 42px;
}

button {
  margin-top: 30px;
  padding: 15px 30px;
  font-size: 22px;
  background: #00c853;
  color: white;
  border: none;
  border-radius: 10px;
}

#out {
  margin-top: 40px;
  font-size: 26px;
}
</style>
</head>

<body>

<h1>⚽ Bet AI</h1>

<button onclick="run()">Trova giocate</button>

<div id="out"></div>

<script>
function run() {

  document.getElementById("out").innerHTML = "⏳ Analisi...";

  let matches = [
    {match:"Inter - Milan", score:25},
    {match:"Real Madrid - Valencia", score:28},
    {match:"Man City - Chelsea", score:27},
    {match:"Juventus - Napoli", score:24},
    {match:"PSG - Lyon", score:26}
  ];

  let best = matches.sort((a,b) => b.score - a.score)[0];

  let tips = [
    "Over 2.5 ⚽",
    "Goal ✅",
    "1 fisso 🏠",
    "Under 3.5 📉"
  ];

  let tip = tips[Math.floor(Math.random()*tips.length)];

  document.getElementById("out").innerHTML =
    "🔥 MIGLIOR GIOCATA 🔥<br><br>" +
    best.match +
    "<br><br>👉 " + tip;
}
</script>

</body>
</html>
