<script>
function run() {

  fetch("https://v3.football.api-sports.io/fixtures?date=2024-05-01", {
    method: "GET",
    headers: {
      "x-apisports-key": "METTI_LA_TUA_CHIAVE"
    }
  })
  .then(res => res.json())
  .then(data => {

    if (data.response.length > 0) {

      let matches = data.response.slice(0, 10);

      let bestMatch = null;
      let bestScore = -999;
      let bestTip = "";

      matches.forEach(m => {

        let home = m.teams.home.name;
        let away = m.teams.away.name;

        // 🧠 LOGICA MIGLIORATA

        let casa = 2; // vantaggio casa
        let forma = Math.random() * 3; // simulazione forma
        let classifica = Math.random() * 3; // simulazione classifica
        let attacco = Math.random() * 3;
        let difesa = Math.random() * 3;

        let score = casa + forma + classifica + attacco + difesa;

        // 🎯 SCELTA PRONOSTICO PIÙ INTELLIGENTE
        let tip = "";

        if (attacco > 2) {
          tip = "Over 2.5 ⚽";
        } else if (difesa > 2) {
          tip = "Under 3.5 📉";
        } else if (casa > 1.5) {
          tip = "1 fisso 🏠";
        } else {
          tip = "Goal ✅";
        }

        if (score > bestScore) {
          bestScore = score;
          bestMatch = m;
          bestTip = tip;
        }

      });

      document.getElementById("out").innerHTML =
        "🔥 MIGLIOR GIOCATA 🔥<br><br>" +
        bestMatch.teams.home.name + " - " +
        bestMatch.teams.away.name + "<br><br>" +
        "👉 " + bestTip;

    } else {
      document.getElementById("out").innerHTML = "Nessuna partita trovata";
    }

  })
  .catch(err => {
    document.getElementById("out").innerHTML = "Errore API";
    console.log(err);
  });

}
</script>
