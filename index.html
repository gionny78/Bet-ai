<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bet AI</title>

<style>
body {
  background:#0f172a;
  color:white;
  font-family:Arial;
  text-align:center;
}

button {
  padding:12px;
  background:#22c55e;
  border:none;
  color:white;
  margin:10px;
  border-radius:8px;
}

.card {
  background:#1e293b;
  margin:10px;
  padding:10px;
  border-radius:10px;
}
</style>

</head>

<body>

<h1>⚽ Bet AI</h1>

<button onclick="caricaPartite()">Trova giocate</button>

<div id="output"></div>

<script>

function caricaPartite(){

 let partite = [
  {home:"Inter", away:"Milan", quota:1.8},
  {home:"Juventus", away:"Roma", quota:2.1},
  {home:"Napoli", away:"Lazio", quota:1.9}
 ];

 let html = "";

 partite.forEach(p => {

  let prob = Math.random();
  let value = (prob * p.quota) - 1;

  if(value > 0.08 && prob > 0.55){
    html += `
    <div class="card">
      ${p.home} vs ${p.away}<br>
      💰 GIOCA<br>
      Quota: ${p.quota}
    </div>`;
  }

 });

 if(html==="") html = "🚫 Nessuna giocata oggi";

 document.getElementById("output").innerHTML = html;
}

</script>

</body>
</html>
