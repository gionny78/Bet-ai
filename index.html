<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Partite</title>
</head>

<body>

<h1>Partite ⚽</h1>
<button onclick="caricaPartite()">Carica partite</button>

<div id="contenitore"></div>

<script>
async function caricaPartite() {
  const container = document.getElementById("contenitore");
  container.innerHTML = "Caricamento...";

  try {
    const res = await fetch("/matches");
    const data = await res.json();

    container.innerHTML = "";

    data.forEach(match => {
      const div = document.createElement("div");

      div.innerHTML = `
        <h3>${match.title}</h3>
        <p>${match.competition}</p>
      `;

      // 👉 gestione video sicura
      if (match.videos && match.videos.length > 0) {
        const wrapper = document.createElement("div");
        wrapper.innerHTML = match.videos[0].embed;

        const iframe = wrapper.querySelector("iframe");

        if (iframe) {
          iframe.style.width = "100%";
          iframe.style.height = "200px";
          div.appendChild(iframe);
        }
      }

      container.appendChild(div);
    });

  } catch (err) {
    container.innerHTML = "Errore!";
    console.log(err);
  }
}
</script>

</body>
</html>
