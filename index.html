<!DOCTYPE html>
<html>
<head>
  <title>Bet AI ULTRA</title>
  <style>
    body {
      background: #0b2239;
      color: white;
      text-align: center;
      font-family: Arial;
      margin-top: 60px;
    }

    button {
      background: green;
      color: white;
      border: none;
      padding: 15px 25px;
      font-size: 18px;
      cursor: pointer;
    }

    .card {
      margin-top: 20px;
      font-size: 20px;
    }
  </style>
</head>

<body>

  <h1>⚽ Bet AI ULTRA</h1>

  <button onclick="run()">Genera schedina</button>

  <div id="out" class="card"></div>

  <script>
    function run() {

      fetch("https://www.scorebat.com/video-api/v3/")
      .then(res => res.json())
      .then(data => {

        if (!data.response || data.response.length === 0) {
          document.getElementById("out").innerHTML = "Nessuna partita";
          return;
        }

        // prendi max 15 partite
        let games = data.response.slice(0, 15);

        // rimuove duplicati
        let unique = [];
        let names = new Set();

        games.forEach(g => {
          if (!names.has(g.title)) {
            names.add(g.title);
            unique.push(g);
          }
        });

        // mescola leggermente
        unique.sort(() => 0.5 - Math.random());

        // prende 3 partite
        let picks = unique.slice(0, 3);

        let result = "🔥 SCHEDINA ULTRA 🔥<br><br>";
        let totalOdds = 1;

        picks.forEach(match => {

          let name = match.title.toLowerCase();
          let tip = "";
          let odd = 1.50;

          // LOGICA PIÙ PULITA
          if (name.includes("psg") || name.includes("bayern") || name.includes("manchester city")) {
            tip = "Over 2.5 ⚽";
            odd = 1.60;
          } 
          else if (name.includes("inter") || name.includes("juventus") || name.includes("milan")) {
            tip = "1X 🛡️";
            odd = 1.40;
          } 
          else if (name.includes("barcelona") || name.includes("real madrid")) {
            tip = "Goal ✅";
            odd = 1.70;
          } 
          else {
            tip = "Under 3.5 📉";
            odd = 1.50;
          }

          totalOdds *= odd;

          result += match.title + "<br>";
          result += "👉 " + tip + " | Quota: " + odd.toFixed(2) + "<br><br>";
        });

        let probability = Math.max(35, (100 / totalOdds)).toFixed(0);

        result += "💰 Quota totale: " + totalOdds.toFixed(2) + "<br>";
        result += "📊 Probabilità: " + probability + "%";

        document.getElementById("out").innerHTML = result;

      })
      .catch(err => {
        document.getElementById("out").innerHTML = "Errore caricamento";
      });

    }
  </script>

</body>
</html>
