<!DOCTYPE html>
<html>
<head>
  <title>Partite</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background: #f2f2f2;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    button {
      width: 100%;
      padding: 15px;
      background: black;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      margin-bottom: 20px;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 15px;
      margin-bottom: 20px;
    }

    img {
      width: 100%;
      border-radius: 10px;
    }

    .video {
      margin-top: 10px;
    }
  </style>
</head>

<body>

<h1>Partite ⚽</h1>

<button onclick="caricaPartite()">Carica partite</button>

<div id="matches"></div>

<script>
function caricaPartite() {
  fetch("/matches")
    .then(res => res.json())
    .then(data => {

      const container = document.getElementById("matches");
      container.innerHTML = "";

      data.forEach(match => {

        const div = document.createElement("div");
        div.className = "card";

        // PRENDI VIDEO EMBED
        let videoHTML = "";
        if (match.videos && match.videos.length > 0) {
          videoHTML = match.videos[0].embed;
        }

        div.innerHTML = `
          <h3>${match.title}</h3>
          <p>${match.competition}</p>

          <img src="${match.thumbnail}" />

          <div class="video">
            ${videoHTML}
          </div>
        `;

        container.appendChild(div);
      });

    })
    .catch(err => {
      console.log("Errore:", err);
    });
}
</script>

</body>
</html>
