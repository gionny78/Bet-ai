<!DOCTYPE html>
<html>
<head>
  <title>Partite</title>
</head>
<body>

<h1>Partite ⚽</h1>

<button id="btn">Carica partite</button>

<div id="matches"></div>

<script>
const btn = document.getElementById("btn");

btn.addEventListener("click", caricaPartite);

function caricaPartite() {
  fetch("/matches")
    .then(res => res.json())
    .then(data => {
      const container = document.getElementById("matches");
      container.innerHTML = "";

      data.forEach(match => {
        const div = document.createElement("div");

        div.innerHTML = `
          <h3>${match.title}</h3>
          <p>${match.competition}</p>
          <img src="${match.thumbnail}" width="300"/>
          <hr>
        `;

        container.appendChild(div);
      });
    })
    .catch(err => {
      console.log("Errore:", err);
      alert("Errore caricamento partite");
    });
}
</script>

</body>
</html>
