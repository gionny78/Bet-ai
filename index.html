<!DOCTYPE html>
<html>
<body style="background:#0b1d2a;color:white;text-align:center;font-family:Arial">

<h1>⚽ Bet AI</h1>

<button onclick="run()" style="padding:15px 30px;background:green;color:white;border:none;font-size:18px">
Trova giocate
</button>

<p id="out">Clicca il bottone</p>

<script>
function run() {
  fetch("https://www.scorebat.com/video-api/v3/")
  .then(res => res.json())
  .then(data => {

    if (data.response.length > 0) {

      let best = data.response[Math.floor(Math.random() * data.response.length)];

      let tips = [
        "Over 2.5 ⚽",
        "Goal ✅",
        "1 fisso 🏠",
        "Under 3.5 📉"
      ];

      let tip = tips[Math.floor(Math.random() * tips.length)];

      document.getElementById("out").innerHTML =
        "🔥 MIGLIOR GIOCATA 🔥<br><br>" +
        best.title + "<br><br>" +
        "👉 " + tip;

    } else {
      document.getElementById("out").innerHTML = "Nessuna partita";
    }

  })
  .catch(err => {
    document.getElementById("out").innerHTML = "Errore";
  });
}
</script>
