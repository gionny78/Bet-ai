<!DOCTYPE html>
<html>
<head>
  <title>Bet AI Mobile</title>

  <style>
    body {
      background: #0b2239;
      color: white;
      text-align: center;
      font-family: Arial;
      margin-top: 80px;
    }

    button {
      background: green;
      color: white;
      border: none;
      padding: 15px 30px;
      font-size: 18px;
      border-radius: 10px;
    }

    #out {
      margin-top: 30px;
      font-size: 22px;
    }
  </style>
</head>

<body>

<h1>⚽ Bet AI</h1>

<button onclick="run()">Analizza</button>

<div id="out">Premi il bottone</div>

<script>
function run() {

  fetch("https://www.scorebat.com/video-api/v3/")
  .then(res => res.json())
  .then(data => {

    let games = data.response.slice(0, 20);

    let best = null;
    let bestScore = -999;
    let bestTip = "";

    games.forEach(match => {

      let name = match.title.toLowerCase();

      let score = 0;

      // squadre forti
      if (name.includes("psg") || name.includes("bayern") || name.includes("city")) score += 5;
      if (name.includes("real") || name.includes("barcelona")) score += 4;
      if (name.includes("inter") || name.includes("milan") || name.includes("juventus")) score += 3;

      // casa (simulata)
      score += 1;

      // attacco/difesa
      let attack = Math.random() * 3;
      let defense = Math.random() * 3;

      score += attack + defense;

      let tip = "";

      if (attack > 2) {
        tip = "Over 2.5 ⚽";
      } else if (defense > 2) {
        tip = "Under 3.5 📉";
      } else if (score > 6) {
        tip = "1 fisso 🏠";
      } else {
        tip = "Goal ✅";
      }

      if (score > bestScore) {
        bestScore = score;
        best = match;
        bestTip = tip;
      }

    });

    document.getElementById("out").innerHTML =
      "🔥 MIGLIOR GIOCATA 🔥<br><br>" +
      best.title + "<br><br>" +
      "👉 " + bestTip;

  })
  .catch(() => {
    document.getElementById("out").innerHTML = "Errore";
  });

}
</script>

</body>
</html>
