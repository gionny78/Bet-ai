<!DOCTYPE html>
<html>
<head>
  <title>Bet AI TOP</title>

  <style>
    body {
      background: #0b2239;
      color: white;
      text-align: center;
      font-family: Arial;
      margin-top: 50px;
    }

    button {
      background: green;
      color: white;
      border: none;
      padding: 15px 30px;
      font-size: 18px;
      border-radius: 10px;
    }

    .card {
      background: #132f4c;
      margin: 15px auto;
      padding: 15px;
      border-radius: 10px;
      width: 85%;
    }

    .tip {
      font-size: 20px;
      color: #00ffcc;
    }
  </style>
</head>

<body>

<h1>⚽ Bet AI TOP</h1>

<button onclick="run()">Analizza top campionati</button>

<div id="out"></div>

<script>
function run() {

  fetch("https://www.scorebat.com/video-api/v3/")
  .then(res => res.json())
  .then(data => {

    let games = data.response.slice(0, 40);

    let valid = [];

    // 🔥 campionati importanti
    let leagues = [
      "serie a",
      "premier",
      "la liga",
      "bundesliga",
      "ligue 1"
    ];

    // 🔥 squadre forti
    let topTeams = [
      "psg","bayern","manchester","real","barcelona",
      "inter","milan","juventus","arsenal","liverpool"
    ];

    games.forEach(match => {

      let title = match.title.toLowerCase();
      let competition = match.competition.toLowerCase();

      // ❌ filtro campionato
      let isTopLeague = leagues.some(l => competition.includes(l));
      if (!isTopLeague) return;

      // ❌ filtro squadre
      let isTopTeam = topTeams.some(t => title.includes(t));
      if (!isTopTeam) return;

      let score = 0;

      // forza squadre
      topTeams.forEach(t => {
        if (title.includes(t)) score += 3;
      });

      // equilibrio
      if (title.includes("-")) score += 2;

      // casa
      score += Math.random() > 0.5 ? 2 : 0;

      // forma simulata
      score += Math.random() * 2;

      // scarta deboli
      if (score < 6) return;

      let tip = "";

      if (score >= 9) {
        tip = "1 + Over 1.5 🔥";
      } else if (score >= 7) {
        tip = "Over 1.5 ⚽";
      } else {
        tip = "Goal ✅";
      }

      valid.push({ match, score, tip });

    });

    // ordina
    valid.sort((a, b) => b.score - a.score);

    let picks = valid.slice(0, 2);

    let html = "<h2>🔥 TOP GIOCATE 🔥</h2>";

    if (picks.length === 0) {
      html += "⚠️ Nessuna partita valida nei top campionati";
    } else {
      picks.forEach(p => {
        html += `
          <div class="card">
            <div>${p.match.title}</div>
            <div class="tip">👉 ${p.tip}</div>
          </div>
        `;
      });
    }

    document.getElementById("out").innerHTML = html;

  })
  .catch(() => {
    document.getElementById("out").innerHTML = "Errore";
  });

}
</script>

</body>
</html>
