<!DOCTYPE html>
<html>
<head>
  <title>Bet AI REAL</title>

  <style>
    body {
      background: #0b2239;
      color: white;
      text-align: center;
      font-family: Arial;
      margin-top: 50px;
    }

    button {
      background: green;
      color: white;
      border: none;
      padding: 15px 30px;
      font-size: 18px;
      border-radius: 10px;
    }

    .card {
      background: #132f4c;
      margin: 15px auto;
      padding: 15px;
      border-radius: 10px;
      width: 85%;
    }

    .tip {
      font-size: 20px;
      color: #00ffcc;
    }

    .warning {
      color: gold;
      margin-top: 20px;
    }
  </style>
</head>

<body>

<h1>⚽ Bet AI REAL</h1>

<button onclick="run()">Analizza dati</button>

<div id="out"></div>

<script>
function run() {

  fetch("https://www.scorebat.com/video-api/v3/")
  .then(res => res.json())
  .then(data => {

    let games = data.response.slice(0, 30);

    let valid = [];

    // squadre affidabili
    let topTeams = [
      "psg","bayern","manchester","real","barcelona",
      "inter","milan","juventus","arsenal","liverpool"
    ];

    games.forEach(match => {

      let name = match.title.toLowerCase();

      let isTop = topTeams.some(team => name.includes(team));

      // ❌ scarta partite senza squadre forti
      if (!isTop) return;

      let score = 0;

      // 🔥 squadra forte
      topTeams.forEach(team => {
        if (name.includes(team)) score += 3;
      });

      // ⚖️ partita giocabile
      if (name.includes("-")) score += 2;

      // 🏠 casa simulata
      score += Math.random() > 0.5 ? 2 : 0;

      // 🧠 forma simulata (meno random)
      score += Math.random() * 2;

      // ❌ scarta se basso
      if (score < 5) return;

      let tip = "";

      // 🎯 logica più “reale”
      if (score >= 8) {
        tip = "1 + Over 1.5 🔥";
      } 
      else if (score >= 6) {
        tip = "Over 1.5 ⚽";
      } 
      else {
        tip = "Goal ✅";
      }

      valid.push({ match, score, tip });

    });

    // ordina
    valid.sort((a, b) => b.score - a.score);

    let picks = valid.slice(0, 2);

    let html = "<h2>🔥 GIOCATE REALI 🔥</h2>";

    if (picks.length === 0) {
      html += "⚠️ Nessuna giocata valida oggi";
    } else {
      picks.forEach(p => {
        html += `
          <div class="card">
            <div>${p.match.title}</div>
            <div class="tip">👉 ${p.tip}</div>
          </div>
        `;
      });
    }

    html += `<div class="warning">⚠️ Solo 1-2 giocate consigliate</div>`;

    document.getElementById("out").innerHTML = html;

  })
  .catch(() => {
    document.getElementById("out").innerHTML = "Errore";
  });

}
</script>

</body>
</html>
