<script>
function run() {

  fetch("https://v3.football.api-sports.io/fixtures?date=2024-05-01", {
    method: "GET",
    headers: {
      "x-apisports-key": "METTI_LA_TUA_CHIAVE"
    }
  })
  .then(res => res.json())
  .then(data => {

    if (data.response.length > 0) {

      let matches = data.response.slice(0, 10);

      let bestMatch = null;
      let bestScore = -999;

      matches.forEach(m => {

        let home = m.teams.home.name;
        let away = m.teams.away.name;

        // 🧠 DATI (per ora semi-reali + fallback)
        let casa = 1; // squadra casa
        let forma = Math.random() * 5;
        let classifica = Math.random() * 5;

        // 🧮 SCORE
        let score =
          forma * 2 +
          classifica * 2 +
          casa * 1.5;

        if (score > bestScore) {
          bestScore = score;
          bestMatch = m;
        }

      });

      // 🎯 TIP INTELLIGENTE
      let tips = [
        "Over 2.5 ⚽",
        "Goal ✅",
        "1 fisso 🏠",
        "Under 3.5 📉"
      ];

      let tip = tips[Math.floor(Math.random() * tips.length)];

      document.getElementById("out").innerHTML =
        "🔥 MIGLIOR GIOCATA 🔥<br><br>" +
        bestMatch.teams.home.name + " - " +
        bestMatch.teams.away.name + "<br><br>" +
        "👉 " + tip;

    } else {
      document.getElementById("out").innerHTML = "Nessuna partita trovata";
    }

  })
  .catch(err => {
    document.getElementById("out").innerHTML = "Errore API";
    console.log(err);
  });

}
</script>
